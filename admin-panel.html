<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel Administrativo - Gestión de Libros">
    <title>Panel Administrativo | Editorial Fontana</title>
    
    <!-- PDF.js para lectura de PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #0f1535;
            --tertiary: #1a1f3a;
            --accent-cyan: #00d4ff;
            --accent-blue: #0099ff;
            --accent-green: #00ff88;
            --text-light: #ffffff;
            --text-main: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #707070;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.02);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--primary);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==================== HEADER ==================== */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light);
            padding: 1.2rem 2rem;
        }

        .header-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2.5px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-logout {
            padding: 0.7rem 1.8rem;
            background: linear-gradient(135deg, #ff6b6b, #ff4444);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-logout:hover {
            box-shadow: 0 8px 20px rgba(255, 68, 68, 0.4);
            transform: translateY(-2px);
        }

        /* ==================== MAIN CONTENT ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            text-align: center;
        }

        .page-title .accent {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ==================== UPLOAD SECTION ==================== */
        .upload-section {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-light);
        }

        .upload-zone {
            border: 2px dashed var(--accent-cyan);
            border-radius: 10px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.05);
            margin-bottom: 2rem;
        }

        .upload-zone:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-green);
        }

        .upload-zone.dragover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent-green);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .upload-subtext {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #pdfInput {
            display: none;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-preview {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .form-preview.show {
            display: block;
        }

        .preview-cover {
            width: 150px;
            height: 200px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .preview-info strong {
            color: var(--text-light);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-primary {
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: var(--primary);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            padding: 1rem;
            background: transparent;
            color: var(--accent-cyan);
            border: 2px solid var(--accent-cyan);
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary:hover {
            background: var(--accent-cyan);
            color: var(--primary);
        }

        /* ==================== BOOKS LIST ==================== */
        .books-section {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 15px;
            padding: 2rem;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .book-card {
            background: linear-gradient(135deg, var(--secondary), var(--tertiary));
            border: 1px solid var(--border-light);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .book-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
        }

        .book-cover {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-info {
            padding: 1rem;
        }

        .book-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.2;
            color: var(--text-light);
        }

        .book-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .book-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-delete {
            flex: 1;
            padding: 0.6rem;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-delete:hover {
            background: #ff2222;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid #ff4444;
            color: #ff6666;
        }

        @media (max-width: 768px) {
            .btn-group {
                grid-template-columns: 1fr;
            }

            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header>
        <div class="header-wrapper">
            <div class="logo">Editorial Fontana</div>
            <div class="header-actions">
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <div class="container">
        <h1 class="page-title">Panel de <span class="accent">Administración</span></h1>

        <div id="alertContainer"></div>

        <!-- ==================== UPLOAD SECTION ==================== -->
        <div class="upload-section">
            <h2 class="section-title">📚 Subir Nuevo Libro</h2>
            
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('pdfInput').click()">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Arrastra tu PDF aquí o haz clic para seleccionar</div>
                <div class="upload-subtext">Formato: PDF | Tamaño máximo: 50MB</div>
            </div>

            <input type="file" id="pdfInput" accept=".pdf" onchange="handleFileSelect(event)">

            <!-- Previsualización -->
            <div class="form-preview" id="formPreview">
                <div class="preview-cover" id="previewCover">
                    <div style="text-align: center; color: var(--text-secondary);">Generando portada...</div>
                </div>
                <div class="preview-info">
                    <div><strong>Archivo:</strong> <span id="previewFile"></span></div>
                    <div><strong>Tamaño:</strong> <span id="previewSize"></span></div>
                    <div><strong>Páginas:</strong> <span id="previewPages"></span></div>
                </div>
            </div>

            <!-- Formulario -->
            <form id="bookForm" onsubmit="handleSubmit(event)" style="display: none;">
                <div class="form-group">
                    <label class="form-label" for="bookTitle">Título del Libro</label>
                    <input 
                        type="text" 
                        id="bookTitle" 
                        class="form-input" 
                        placeholder="Ingresa el título del libro"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="bookAuthor">Autor</label>
                    <input 
                        type="text" 
                        id="bookAuthor" 
                        class="form-input" 
                        placeholder="Nombre del autor"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="bookYear">Año de Publicación</label>
                    <select id="bookYear" class="form-select" required>
                        <option value="">Selecciona un año</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                        <option value="2019">2019</option>
                        <option value="2018">2018</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="bookGenre">Género</label>
                    <select id="bookGenre" class="form-select" required>
                        <option value="">Selecciona un género</option>
                        <option value="poesia">Poesía</option>
                        <option value="narrativa">Narrativa</option>
                        <option value="ensayo">Ensayo</option>
                        <option value="cuento">Cuento</option>
                        <option value="drama">Drama</option>
                        <option value="ficcion">Ficción</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="bookDescription">Descripción</label>
                    <textarea 
                        id="bookDescription" 
                        class="form-input" 
                        rows="4"
                        placeholder="Breve descripción del libro"
                        style="resize: vertical; font-family: inherit;"
                        required
                    ></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-primary">📤 Guardar Libro</button>
                    <button type="button" class="btn-secondary" onclick="cancelUpload()">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- ==================== BOOKS LIST ==================== -->
        <div class="books-section">
            <h2 class="section-title">📖 Libros Publicados</h2>
            <div class="books-grid" id="booksList">
                <div class="empty-state">
                    <div class="empty-icon">📚</div>
                    <p>No hay libros publicados aún</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Verificar si está logueado
        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('adminLoggedIn');
            if (!isLoggedIn) {
                window.location.href = 'login-admin.html';
            }
            loadBooks();
        });

        let currentPdfData = null;

        const uploadZone = document.getElementById('uploadZone');
        const pdfInput = document.getElementById('pdfInput');

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                pdfInput.files = files;
                handleFileSelect({ target: { files } });
            }
        });

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file || file.type !== 'application/pdf') {
                showAlert('Por favor selecciona un archivo PDF válido', 'error');
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                showAlert('El archivo es demasiado grande (máximo 50MB)', 'error');
                return;
            }

            try {
                const fileData = await readFileAsDataURL(file);
                const pdf = await pdfjsLib.getDocument(fileData).promise;
                
                // Extraer primera página como portada
                const firstPage = await pdf.getPage(1);
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const viewport = firstPage.getViewport({ scale: 2 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                await firstPage.render({ canvasContext: context, viewport }).promise;
                const coverImage = canvas.toDataURL('image/jpeg', 0.8);

                currentPdfData = {
                    pdf: fileData,
                    cover: coverImage,
                    fileName: file.name,
                    fileSize: (file.size / 1024 / 1024).toFixed(2),
                    pageCount: pdf.numPages
                };

                showPreview();
            } catch (error) {
                showAlert('Error al procesar el PDF: ' + error.message, 'error');
            }
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function showPreview() {
            document.getElementById('formPreview').classList.add('show');
            document.getElementById('previewFile').textContent = currentPdfData.fileName;
            document.getElementById('previewSize').textContent = currentPdfData.fileSize + ' MB';
            document.getElementById('previewPages').textContent = currentPdfData.pageCount;
            
            const coverImg = new Image();
            coverImg.onload = () => {
                document.getElementById('previewCover').innerHTML = '';
                document.getElementById('previewCover').appendChild(coverImg);
            };
            coverImg.src = currentPdfData.cover;

            document.getElementById('bookForm').style.display = 'block';
        }

        function handleSubmit(event) {
            event.preventDefault();

            if (!currentPdfData) {
                showAlert('Por favor selecciona un PDF', 'error');
                return;
            }

            const book = {
                id: Date.now(),
                title: document.getElementById('bookTitle').value,
                author: document.getElementById('bookAuthor').value,
                year: document.getElementById('bookYear').value,
                genre: document.getElementById('bookGenre').value,
                description: document.getElementById('bookDescription').value,
                cover: currentPdfData.cover,
                pdf: currentPdfData.pdf,
                pages: currentPdfData.pageCount
            };

            let books = JSON.parse(localStorage.getItem('editoralBooks')) || [];
            books.push(book);
            localStorage.setItem('editoralBooks', JSON.stringify(books));

            showAlert('✅ Libro guardado exitosamente', 'success');
            cancelUpload();
            loadBooks();
        }

        function cancelUpload() {
            currentPdfData = null;
            document.getElementById('bookForm').reset();
            document.getElementById('bookForm').style.display = 'none';
            document.getElementById('formPreview').classList.remove('show');
            document.getElementById('pdfInput').value = '';
        }

        function loadBooks() {
            const books = JSON.parse(localStorage.getItem('editoralBooks')) || [];
            const booksList = document.getElementById('booksList');

            if (books.length === 0) {
                booksList.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">📚</div>
                        <p>No hay libros publicados aún</p>
                    </div>
                `;
                return;
            }

            booksList.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-cover">
                        <img src="${book.cover}" alt="${book.title}">
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-meta">
                            <div><strong>${book.author}</strong></div>
                            <div>${book.year} • ${book.genre}</div>
                        </div>
                        <div class="book-actions">
                            <button class="btn-delete" onclick="deleteBook(${book.id})">Eliminar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteBook(id) {
            if (confirm('¿Estás seguro de que deseas eliminar este libro?')) {
                let books = JSON.parse(localStorage.getItem('editoralBooks')) || [];
                books = books.filter(book => book.id !== id);
                localStorage.setItem('editoralBooks', JSON.stringify(books));
                showAlert('Libro eliminado correctamente', 'success');
                loadBooks();
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 4000);
        }

        function logout() {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                localStorage.removeItem('adminLoggedIn');
                localStorage.removeItem('adminLoginTime');
                window.location.href = 'login-admin.html';
            }
        }

        // Establecer PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

</body>
</html>
