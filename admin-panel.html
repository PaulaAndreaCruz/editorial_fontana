<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Editorial Fontana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
        }

        h1 {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn-logout {
            background: linear-gradient(135deg, #ff6b6b, #ff4444);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .section {
            background: rgba(26, 31, 58, 0.8);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .section-title {
            color: #00d4ff;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-area {
            border: 2px dashed #00d4ff;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.05);
        }

        .upload-area:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00b8d4;
        }

        .upload-area.dragover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00b8d4;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            color: #a0a0a0;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #666;
        }

        #pdfInput {
            display: none;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00d4ff;
            font-weight: bold;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 0.9rem;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #0a0e27;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0a0e27;
        }

        .btn-secondary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .book-card {
            background: rgba(10, 14, 39, 0.5);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
            transition: all 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .book-cover {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #0066ff, #00d4ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            overflow: hidden;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-info {
            padding: 1rem;
        }

        .book-title {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .book-author {
            color: #a0a0a0;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .book-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #00d4ff;
            color: #0a0e27;
            font-weight: bold;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
        }

        .btn-small:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .section {
                padding: 1rem;
            }

            .button-group {
                flex-direction: column;
            }

            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔐 Panel de Administración</h1>
            <button class="btn-logout" onclick="logout()">CERRAR SESIÓN</button>
        </div>

        <!-- Alerts -->
        <div id="alertContainer"></div>

        <!-- Upload Section -->
        <div class="section">
            <div class="section-title">📤 Subir Nuevo Libro</div>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('pdfInput').click();">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Arrastra tu PDF aquí o haz clic para seleccionar</div>
                <div class="upload-hint">Formato: PDF | Tamaño máximo: 50MB</div>
                <input type="file" id="pdfInput" accept=".pdf" onchange="handleFileUpload(event)">
            </div>

            <div id="previewContainer" style="display: none; margin-top: 1.5rem;">
                <div class="form-group">
                    <label>Portada (Extraída automáticamente)</label>
                    <div style="width: 150px; height: 200px; background: #1a1f3a; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                        <img id="coverPreview" style="max-width: 100%; max-height: 100%; border-radius: 8px;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Foto del Autor (Última página del PDF)</label>
                    <div style="width: 150px; height: 150px; background: linear-gradient(135deg, #0066ff, #00d4ff); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <img id="authorPhotoPreview" style="max-width: 100%; max-height: 100%; object-fit: cover;">
                        <div id="authorPhotoPlaceholder" style="font-size: 2rem;">👤</div>
                    </div>
                    <p style="color: #00ff88; font-size: 0.85rem; margin-top: 0.5rem;">✅ Foto extraída de la última página del PDF</p>
                </div>

                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="bookTitle" placeholder="Título del libro">
                </div>

                <div class="form-group">
                    <label>Autor</label>
                    <input type="text" id="bookAuthor" placeholder="Nombre del autor">
                </div>

                <div class="form-group">
                    <label>Año</label>
                    <input type="text" id="bookYear" placeholder="2024">
                </div>

                <div class="form-group">
                    <label>Género</label>
                    <input type="text" id="bookGenre" placeholder="Ejemplo: Ficción, Poesía, etc.">
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="bookDescription" placeholder="Descripción del libro y biografía del autor..."></textarea>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" id="btnSave" onclick="saveBook()">💾 Guardar Libro</button>
                    <button class="btn btn-primary" onclick="cancelUpload()" style="background: linear-gradient(135deg, #ff6b6b, #ff4444); color: white;">❌ Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Books List -->
        <div class="section">
            <div class="section-title">📚 Libros Guardados</div>
            <div class="books-grid" id="booksContainer">
                <p style="color: #a0a0a0; text-align: center; grid-column: 1/-1;">Cargando libros...</p>
            </div>
        </div>
    </div>

    <script>
        let db = null;
        let currentPDF = null;
        let currentCover = null;
        let currentAuthorPhoto = null;
        let totalPages = 0;

        // Inicializar
        async function init() {
            await initDB();
            loadBooks();
            setupUploadArea();
        }

        // Inicializar IndexedDB
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('EditorialFontana', 2);
                request.onerror = () => {
                    console.error('Error abriendo IndexedDB:', request.error);
                    reject(request.error);
                };
                request.onsuccess = () => {
                    db = request.result;
                    console.log('✅ IndexedDB inicializado');
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('books')) {
                        database.createObjectStore('books', { keyPath: 'id' });
                        console.log('✅ Tabla books creada');
                    }
                    if (!database.objectStoreNames.contains('comments')) {
                        const commentsStore = database.createObjectStore('comments', { keyPath: 'id' });
                        commentsStore.createIndex('bookId', 'bookId', { unique: false });
                        console.log('✅ Tabla comments creada');
                    }
                };
            });
        }

        // Setup drag & drop
        function setupUploadArea() {
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });
        }

        // Manejar archivo
        async function handleFileUpload(event) {
            if (event.target.files.length > 0) {
                handleFile(event.target.files[0]);
            }
        }

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                showAlert('Por favor selecciona un archivo PDF', 'error');
                return;
            }

            try {
                showAlert('Procesando PDF...', 'success');
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const pdfData = e.target.result;
                    currentPDF = pdfData;
                    await extractPDFInfo(pdfData);
                    document.getElementById('previewContainer').style.display = 'block';
                };
                reader.readAsDataURL(file);
            } catch (error) {
                showAlert('Error al procesar PDF: ' + error.message, 'error');
            }
        }

        // Extraer info del PDF
        async function extractPDFInfo(pdfData) {
            try {
                const binaryString = atob(pdfData.split(',')[1]);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                const pdf = await pdfjsLib.getDocument(bytes.buffer).promise;
                totalPages = pdf.numPages;

                // Primera página (portada)
                const firstPage = await pdf.getPage(1);
                const canvas1 = document.createElement('canvas');
                const ctx1 = canvas1.getContext('2d');
                const viewport1 = firstPage.getViewport({ scale: 1 });
                canvas1.width = viewport1.width;
                canvas1.height = viewport1.height;
                await firstPage.render({ canvasContext: ctx1, viewport: viewport1 }).promise;
                currentCover = canvas1.toDataURL('image/jpeg', 0.9);
                document.getElementById('coverPreview').src = currentCover;

                // Última página (foto del autor)
                const lastPage = await pdf.getPage(totalPages);
                const canvas2 = document.createElement('canvas');
                const ctx2 = canvas2.getContext('2d');
                const viewport2 = lastPage.getViewport({ scale: 1 });
                canvas2.width = viewport2.width;
                canvas2.height = viewport2.height;
                await lastPage.render({ canvasContext: ctx2, viewport: viewport2 }).promise;
                currentAuthorPhoto = canvas2.toDataURL('image/jpeg', 0.9);
                document.getElementById('authorPhotoPreview').src = currentAuthorPhoto;
                document.getElementById('authorPhotoPlaceholder').style.display = 'none';

                showAlert('✅ PDF procesado correctamente', 'success');
            } catch (error) {
                showAlert('Error extrayendo info del PDF: ' + error.message, 'error');
            }
        }

        // Guardar libro
        async function saveBook() {
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const year = document.getElementById('bookYear').value.trim();
            const genre = document.getElementById('bookGenre').value.trim();
            const description = document.getElementById('bookDescription').value.trim();

            if (!title || !author || !currentPDF) {
                showAlert('Por favor completa los campos obligatorios', 'error');
                return;
            }

            try {
                const book = {
                    id: Date.now(),
                    title, author, year, genre, description,
                    pdf: currentPDF,
                    cover: currentCover,
                    authorPhoto: currentAuthorPhoto,
                    pages: totalPages,
                    createdAt: new Date().toISOString()
                };

                const transaction = db.transaction(['books'], 'readwrite');
                const store = transaction.objectStore('books');
                store.add(book);

                await new Promise((resolve, reject) => {
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });

                showAlert('✅ Libro guardado correctamente', 'success');
                cancelUpload();
                loadBooks();
            } catch (error) {
                showAlert('❌ Error al guardar: ' + error.message, 'error');
            }
        }

        // Cargar libros
        async function loadBooks() {
            try {
                const transaction = db.transaction(['books'], 'readonly');
                const store = transaction.objectStore('books');
                const request = store.getAll();

                request.onsuccess = () => {
                    const books = request.result;
                    displayBooks(books);
                };

                request.onerror = () => {
                    showAlert('Error al cargar libros', 'error');
                    document.getElementById('booksContainer').innerHTML = '<p style="color: #ff6b6b;">Error al cargar los libros</p>';
                };
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        // Mostrar libros
        function displayBooks(books) {
            const container = document.getElementById('booksContainer');
            if (books.length === 0) {
                container.innerHTML = '<p style="color: #a0a0a0; text-align: center; grid-column: 1/-1;">No hay libros. ¡Sube uno ahora!</p>';
                return;
            }

            container.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-cover">
                        ${book.cover ? `<img src="${book.cover}" alt="${book.title}">` : '📖'}
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">${book.author}</div>
                        <div class="book-actions">
                            <button class="btn-small btn-edit" onclick="editBook(${book.id})">✏️ Editar</button>
                            <button class="btn-small btn-delete" onclick="deleteBook(${book.id})">🗑️ Eliminar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Editar libro
        function editBook(id) {
            alert('Función de editar en desarrollo');
        }

        // Eliminar libro
        async function deleteBook(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar este libro?')) return;

            try {
                const transaction = db.transaction(['books'], 'readwrite');
                const store = transaction.objectStore('books');
                store.delete(id);

                await new Promise((resolve, reject) => {
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });

                showAlert('✅ Libro eliminado', 'success');
                loadBooks();
            } catch (error) {
                showAlert('Error al eliminar: ' + error.message, 'error');
            }
        }

        // Cancelar subida
        function cancelUpload() {
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('pdfInput').value = '';
            currentPDF = null;
            currentCover = null;
            currentAuthorPhoto = null;
        }

        // Mostrar alerta
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        // Logout
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'login-admin.html';
        }

        // Cargar PDF.js
        if (typeof pdfjsLib === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
            script.onload = () => {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                init();
            };
            document.head.appendChild(script);
        } else {
            init();
        }
    </script>
</body>
</html>
