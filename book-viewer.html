<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visualizador de Libro - Editorial Fontana">
    <title>Libro | Editorial Fontana</title>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- StPageFlip CSS + JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip@latest/dist/page-flip.min.css">
    <script src="https://cdn.jsdelivr.net/npm/page-flip@latest/dist/page-flip.min.js"></script>

    <!-- Three.js (para compatibilidad) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #0f1535;
            --tertiary: #1a1f3a;
            --accent-cyan: #00d4ff;
            --accent-blue: #0099ff;
            --accent-green: #00ff88;
            --text-light: #ffffff;
            --text-main: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--primary);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* ==================== HEADER ==================== */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light);
            padding: 1.2rem 2rem;
        }

        .header-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2.5px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .btn-back {
            padding: 0.7rem 1.8rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: var(--primary);
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-back:hover {
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ==================== BOOK INFO SECTION ==================== */
        .book-header {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 3rem;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-light);
        }

        .book-cover-large {
            width: 100%;
            height: 350px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
        }

        .book-cover-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-details h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .book-author {
            font-size: 1.1rem;
            color: var(--accent-cyan);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .book-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .meta-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .book-description {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        /* ==================== AUTHOR BIO ==================== */
        .author-section {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 3rem;
        }

        .author-container {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .author-photo-wrapper {
            width: 180px;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-light);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            padding: 1rem;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .author-photo-wrapper:hover {
            transform: scale(1.05);
            border-color: var(--accent-cyan);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.3);
        }

        .author-photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .zoom-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 212, 255, 0.9);
            color: var(--primary);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .author-photo-wrapper:hover .zoom-button {
            display: flex;
        }

        .zoom-button:hover {
            background: var(--accent-cyan);
            transform: scale(1.1);
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-light);
        }

        .author-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .author-container {
                grid-template-columns: 1fr;
            }

            .author-photo-wrapper {
                width: 100%;
                height: 250px;
            }
        }

        /* ==================== PDF VIEWER (STPAGEFLIP) ==================== */
        .pdf-viewer-section {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 3rem;
        }

        .pdf-viewer-container {
            background: linear-gradient(to right, #0a0e27 0%, #1a1a2e 50%, #0a0e27 100%);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            padding: 3rem 2rem;
            position: relative;
            box-shadow: 
                inset -30px 0 40px rgba(0, 0, 0, 0.8),
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(0, 212, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 700px;
            perspective: 1200px;
        }

        .pdf-viewer-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, transparent, rgba(0, 212, 255, 0.8), transparent);
            z-index: 20;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        #book {
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .page {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* CONTROLES DE ZOOM */
        .pdf-zoom-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }

        .zoom-btn {
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, #0099ff 0%, #00d4ff 100%);
            color: white;
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .zoom-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .zoom-info {
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        /* CONTROLES DE NAVEGACIÓN */
        .book-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .nav-btn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-info {
            color: var(--text-secondary);
            font-weight: bold;
            font-family: 'Courier New', monospace;
            min-width: 140px;
            text-align: center;
        }

        /* ==================== MODAL ZOOM FOTO ==================== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .modal-close:hover {
            background: var(--accent-cyan);
            transform: scale(1.1);
        }

        /* ==================== COMMENTS SECTION ==================== */
        .comments-section {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 15px;
            padding: 2rem;
        }

        .comment-form {
            background: rgba(0, 20, 40, 0.3);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--accent-green), #00cc66);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .comment {
            background: rgba(0, 20, 40, 0.3);
            padding: 1.5rem;
            border-left: 4px solid var(--accent-cyan);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .comment-author {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .comment-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .comment-rating {
            color: #ffd700;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .comment-text {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .empty-comments {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        /* ==================== LOADING ==================== */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            gap: 1.5rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .book-header {
                grid-template-columns: 1fr;
            }

            .pdf-viewer-container {
                min-height: 500px;
                padding: 1rem;
            }

            .book-meta {
                grid-template-columns: 1fr;
            }

            #book {
                max-width: 100%;
            }

            .book-controls {
                flex-direction: column;
            }

            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-wrapper">
            <div class="logo" onclick="goHome()">📚 FONTANA</div>
            <button class="btn-back" onclick="goBack()">← VOLVER</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Book Info -->
        <div class="book-header">
            <div class="book-cover-large">
                <img id="bookCover" src="" alt="Portada" style="display:none;">
                <div id="coverPlaceholder">📖</div>
            </div>
            <div class="book-details">
                <h1 id="bookTitle">Cargando...</h1>
                <p class="book-author">por <span id="bookAuthor"></span></p>
                <div class="book-meta">
                    <div class="meta-item">
                        <span class="meta-label">AÑO DE PUBLICACIÓN</span>
                        <span class="meta-value" id="bookYear">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">GÉNERO</span>
                        <span class="meta-value" id="bookGenre">-</span>
                    </div>
                </div>
                <div class="book-description" id="bookDescription">Cargando descripción...</div>
            </div>
        </div>

        <!-- Author Section -->
        <div class="author-section">
            <div class="section-title">👤 Acerca del Autor</div>
            <div class="author-container">
                <div class="author-photo-wrapper" onclick="openPhotoModal()">
                    <img id="authorPhoto" style="display:none;">
                    <span id="authorPhotoPlaceholder">🖼️</span>
                    <button class="zoom-button" title="Ver más grande">🔍</button>
                </div>
                <div class="author-info">
                    <div class="author-content" id="authorBio">Cargando información del autor...</div>
                </div>
            </div>
        </div>

        <!-- PDF Viewer (StPageFlip) -->
        <div class="pdf-viewer-section">
            <h2 class="section-title">📖 Leer Libro</h2>
            
            <div id="flipbook-container" class="loading">
                <div class="spinner"></div>
                <p style="color: var(--text-secondary);">Preparando libro...</p>
            </div>

            <div class="pdf-viewer-container" id="viewerContainer" style="display:none;">
                <div id="book"></div>
            </div>

            <div class="pdf-zoom-controls" id="zoomControls" style="display:none;">
                <button class="zoom-btn" onclick="zoomOut()">🔍− Alejarse</button>
                <span class="zoom-info" id="zoomLevel">100%</span>
                <button class="zoom-btn" onclick="resetZoom()">↺ Normal</button>
                <button class="zoom-btn" onclick="zoomIn()">🔍+ Acercar</button>
            </div>

            <div class="book-controls" id="controls" style="display:none;">
                <button class="nav-btn" id="btnPrev" onclick="prevPage()">← Página Anterior</button>
                <div class="page-info">
                    Página <span id="currentPage">1</span> de <span id="totalPages">0</span>
                </div>
                <button class="nav-btn" id="btnNext" onclick="nextPage()">Página Siguiente →</button>
            </div>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
            <h2 class="section-title">💬 Comentarios y Reseñas</h2>

            <form class="comment-form" onsubmit="addComment(event)">
                <div class="form-group">
                    <label for="commentName">Tu Nombre</label>
                    <input type="text" id="commentName" required placeholder="Escribe tu nombre">
                </div>

                <div class="form-group">
                    <label for="commentRating">Calificación</label>
                    <select id="commentRating" required>
                        <option value="5">⭐⭐⭐⭐⭐ Excelente</option>
                        <option value="4">⭐⭐⭐⭐ Muy Bueno</option>
                        <option value="3">⭐⭐⭐ Bueno</option>
                        <option value="2">⭐⭐ Regular</option>
                        <option value="1">⭐ Malo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="commentText">Tu Comentario</label>
                    <textarea id="commentText" required placeholder="Comparte tu opinión sobre este libro..."></textarea>
                </div>

                <button type="submit" class="btn-submit">📤 PUBLICAR COMENTARIO</button>
            </form>

            <div id="commentsList">
                <div class="empty-comments"><p>No hay comentarios aún. ¡Sé el primero en comentar!</p></div>
            </div>
        </div>
    </div>

    <!-- Modal Zoom Foto -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <img id="modalPhotoImg" src="" alt="Foto del autor">
            <button class="modal-close" onclick="closePhotoModal()">✕</button>
        </div>
    </div>

    <script>
        let db = null;
        let bookId = null;
        let currentBook = null;
        let pageImages = [];
        let pageFlip = null;
        let currentPageNum = 1;
        let currentZoom = 100;

        // Obtener ID del libro
        const urlParams = new URLSearchParams(window.location.search);
        bookId = parseInt(urlParams.get('id'));

        // Inicializar IndexedDB
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('EditorialFontana', 2);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    console.log('✅ IndexedDB inicializado');
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('books')) {
                        database.createObjectStore('books', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('comments')) {
                        const commentsStore = database.createObjectStore('comments', { keyPath: 'id' });
                        commentsStore.createIndex('bookId', 'bookId', { unique: false });
                    }
                };
            });
        }

        // Obtener libro de IndexedDB
        async function getBook(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['books'], 'readonly');
                const store = transaction.objectStore('books');
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Renderizar PDF
        async function renderPDF(pdfData) {
            try {
                const binaryString = atob(pdfData.split(',')[1] || pdfData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                const pdf = await pdfjsLib.getDocument(bytes.buffer).promise;
                pageImages = [];

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 2 });

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;

                    pageImages.push(canvas.toDataURL('image/jpeg', 0.95));
                }

                initStPageFlip();
            } catch (error) {
                console.error('Error renderizando PDF:', error);
                document.getElementById('flipbook-container').innerHTML = '<p style="color: #ff6b6b;">Error al cargar el libro</p>';
            }
        }

        // Inicializar StPageFlip
        function initStPageFlip() {
            const bookDiv = document.getElementById('book');
            bookDiv.innerHTML = '';

            // Crear elementos de página
            pageImages.forEach((imageUrl) => {
                const page = document.createElement('div');
                page.className = 'page';
                const img = document.createElement('img');
                img.src = imageUrl;
                page.appendChild(img);
                bookDiv.appendChild(page);
            });

            // Mostrar contenedor del libro
            document.getElementById('flipbook-container').style.display = 'none';
            document.getElementById('viewerContainer').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('zoomControls').style.display = 'flex';

            // Actualizar información
            document.getElementById('totalPages').textContent = pageImages.length;

            // Inicializar PageFlip
            setTimeout(() => {
                try {
                    if (typeof PageFlip === 'undefined') {
                        console.error('PageFlip no está disponible');
                        return;
                    }

                    pageFlip = new PageFlip(bookDiv, {
                        width: 600,
                        height: 700,
                        size: 'stretch',
                        minWidth: 300,
                        maxWidth: 1000,
                        minHeight: 400,
                        maxHeight: 900,
                        maxShadowOpacity: 0.5,
                        showCover: true,
                        flareAngle: 60,
                        density: 0.6,
                        startPage: 1,
                        autoSize: true,
                        useMouseEvents: true,
                        swipeDistance: 50,
                        clickEventForward: true,
                        useSound: false,
                        hardCovers: true,
                        softPages: true,
                        realisticShadows: true
                    });

                    pageFlip.on('flip', (object) => {
                        currentPageNum = object.data;
                        document.getElementById('currentPage').textContent = currentPageNum;
                        updateControls();
                    });

                    pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                    updateControls();
                    console.log('✅ StPageFlip inicializado correctamente');
                } catch (error) {
                    console.error('Error inicializando PageFlip:', error);
                }
            }, 100);
        }

        // Navegación
        function nextPage() {
            if (pageFlip && currentPageNum < pageImages.length) {
                pageFlip.turnToNextPage();
            }
        }

        function prevPage() {
            if (pageFlip && currentPageNum > 1) {
                pageFlip.turnToPrevPage();
            }
        }

        function updateControls() {
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            btnPrev.disabled = currentPageNum <= 1;
            btnNext.disabled = currentPageNum >= pageImages.length;
        }

        // Zoom
        function zoomIn() {
            currentZoom = Math.min(currentZoom + 25, 300);
            applyZoom();
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 25, 50);
            applyZoom();
        }

        function resetZoom() {
            currentZoom = 100;
            applyZoom();
        }

        function applyZoom() {
            const bookDiv = document.getElementById('book');
            bookDiv.style.zoom = (currentZoom / 100);
            document.getElementById('zoomLevel').textContent = currentZoom + '%';
        }

        // Modal foto autor
        function openPhotoModal() {
            const photoImg = document.getElementById('authorPhoto');
            if (photoImg.style.display !== 'none' && photoImg.src) {
                const modal = document.getElementById('photoModal');
                const modalImg = document.getElementById('modalPhotoImg');
                modalImg.src = photoImg.src;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closePhotoModal() {
            const modal = document.getElementById('photoModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Cerrar modal con ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePhotoModal();
            }
        });

        // Cerrar modal al hacer click fuera
        document.getElementById('photoModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePhotoModal();
            }
        });

        // Mostrar información del libro
        function displayBook(book) {
            currentBook = book;
            document.getElementById('bookTitle').textContent = book.title;
            document.getElementById('bookAuthor').textContent = book.author;
            document.getElementById('bookYear').textContent = book.year;
            document.getElementById('bookGenre').textContent = book.genre || '-';
            document.getElementById('bookDescription').textContent = book.description || 'Sin descripción disponible';

            if (book.cover) {
                const img = document.getElementById('bookCover');
                img.src = book.cover;
                img.style.display = 'block';
                document.getElementById('coverPlaceholder').style.display = 'none';
            }

            if (book.authorPhoto) {
                const img = document.getElementById('authorPhoto');
                img.src = book.authorPhoto;
                img.style.display = 'block';
                document.getElementById('authorPhotoPlaceholder').style.display = 'none';
            }

            const bio = `<strong>${book.author}</strong> (${book.year})<br><br>${book.description || 'Autor destacado de Editorial Fontana'}`;
            document.getElementById('authorBio').innerHTML = bio;
        }

        // Comentarios
        function addComment(event) {
            event.preventDefault();

            const comment = {
                id: Date.now(),
                bookId: bookId,
                name: document.getElementById('commentName').value,
                rating: parseInt(document.getElementById('commentRating').value),
                text: document.getElementById('commentText').value,
                date: new Date().toLocaleDateString('es-ES')
            };

            try {
                const transaction = db.transaction(['comments'], 'readwrite');
                const store = transaction.objectStore('comments');
                store.add(comment);

                document.getElementById('commentName').value = '';
                document.getElementById('commentRating').value = '5';
                document.getElementById('commentText').value = '';

                loadComments();
            } catch (error) {
                console.error('Error guardando comentario:', error);
            }
        }

        function loadComments() {
            try {
                const transaction = db.transaction(['comments'], 'readonly');
                const store = transaction.objectStore('comments');
                const index = store.index('bookId');
                const range = IDBKeyRange.only(bookId);
                const request = index.getAll(range);

                request.onsuccess = () => {
                    const comments = request.result || [];
                    displayComments(comments);
                };
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayComments(comments) {
            const container = document.getElementById('commentsList');

            if (comments.length === 0) {
                container.innerHTML = '<div class="empty-comments"><p>No hay comentarios aún. ¡Sé el primero en comentar!</p></div>';
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-author">${comment.name}</span>
                        <span class="comment-date">${comment.date}</span>
                    </div>
                    <div class="comment-rating">${'⭐'.repeat(comment.rating)}</div>
                    <div class="comment-text">${comment.text}</div>
                </div>
            `).join('');
        }

        // Navegación
        function goBack() {
            window.history.back();
        }

        function goHome() {
            window.location.href = 'https://paulaandreacruz.github.io/editorial_fontana/';
        }

        // Iniciar
        async function init() {
            try {
                if (!bookId) {
                    document.getElementById('flipbook-container').innerHTML = '<p style="color: #ff6b6b;">ID de libro no especificado</p>';
                    return;
                }

                await initDB();
                const book = await getBook(bookId);

                if (!book) {
                    document.getElementById('flipbook-container').innerHTML = '<p style="color: #ff6b6b;">Libro no encontrado</p>';
                    return;
                }

                displayBook(book);
                await renderPDF(book.pdf);
                await loadComments();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('flipbook-container').innerHTML = '<p style="color: #ff6b6b;">Error: ' + error.message + '</p>';
            }
        }

        // Cargar cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>

</body>
</html>
