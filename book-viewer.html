<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Libros | Editorial Fontana</title>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- StPageFlip CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip@latest/dist/page-flip.min.css">
    
    <!-- StPageFlip JS -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@latest/dist/page-flip.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
        }

        .header-content h1 {
            color: #00d4ff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .header-content p {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .btn-back {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #0a0e27;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.5);
        }

        .book-section {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        #book {
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        .page {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(26, 31, 58, 0.8);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }

        .btn-control {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #0a0e27;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
        }

        .btn-control:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-control:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #a0a0a0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .page-input {
            width: 60px;
            padding: 0.5rem;
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 6px;
            color: #00d4ff;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 2rem;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #00d4ff;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .error-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 2rem;
        }

        .error-text {
            color: #ff6b6b;
            font-size: 1.2rem;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
        }

        .author-section {
            background: rgba(26, 31, 58, 0.8);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .author-title {
            color: #00d4ff;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .author-photo {
            width: 250px;
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
            background: linear-gradient(135deg, #0066ff, #00d4ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .author-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-bio {
            color: #a0a0a0;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .author-bio strong {
            color: #00d4ff;
            font-size: 1.1rem;
        }

        .comments-section {
            background: rgba(26, 31, 58, 0.8);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .comments-title {
            color: #00d4ff;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .comment-form {
            background: rgba(10, 14, 39, 0.5);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00d4ff;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0a0e27;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .comments-list {
            space-y: 1rem;
        }

        .comment-item {
            background: rgba(10, 14, 39, 0.5);
            padding: 1rem;
            border-left: 4px solid #00d4ff;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .comment-author {
            color: #00d4ff;
            font-weight: bold;
        }

        .comment-date {
            color: #666;
            font-size: 0.8rem;
        }

        .comment-rating {
            color: #ffd700;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .comment-text {
            color: #e0e0e0;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .wrapper {
                padding: 1rem;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
            }

            .btn-control {
                width: 100%;
            }

            .author-content {
                grid-template-columns: 1fr;
            }

            .author-photo {
                width: 100%;
                max-width: 250px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1 id="bookTitle">Cargando...</h1>
                <p>
                    <span id="bookAuthor"></span> • <span id="bookYear"></span>
                </p>
            </div>
            <button class="btn-back" onclick="goBack()">← VOLVER</button>
        </div>

        <!-- Book Container -->
        <div class="book-section">
            <div id="book"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-control" id="btnPrev" onclick="prevPage()">← Anterior</button>
            
            <div class="page-info">
                <span>Página:</span>
                <input type="number" id="pageNum" class="page-input" min="1" onchange="goToPageInput()">
                <span>/</span>
                <span id="totalPages">0</span>
            </div>

            <button class="btn-control" id="btnNext" onclick="nextPage()">Siguiente →</button>
        </div>

        <!-- Author Section -->
        <div class="author-section">
            <div class="author-title">👤 Acerca del Autor</div>
            <div class="author-content">
                <div class="author-photo" id="authorPhotoContainer">
                    <div id="authorPhotoPlaceholder">🖼️</div>
                    <img id="authorPhoto" style="display: none;">
                </div>
                <div class="author-bio" id="authorBio">
                    Cargando información del autor...
                </div>
            </div>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
            <div class="comments-title">💬 Comentarios y Reseñas</div>
            
            <div class="comment-form">
                <div class="form-group">
                    <label>Tu Nombre</label>
                    <input type="text" id="commentName" placeholder="Escribe tu nombre">
                </div>

                <div class="form-group">
                    <label>Calificación</label>
                    <select id="commentRating">
                        <option value="5">⭐⭐⭐⭐⭐ Excelente</option>
                        <option value="4">⭐⭐⭐⭐ Muy Bueno</option>
                        <option value="3">⭐⭐⭐ Bueno</option>
                        <option value="2">⭐⭐ Regular</option>
                        <option value="1">⭐ Malo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tu Comentario</label>
                    <textarea id="commentText" placeholder="Comparte tu opinión sobre este libro..."></textarea>
                </div>

                <button class="btn-submit" onclick="addComment()">📤 Publicar Comentario</button>
            </div>

            <div class="comments-list" id="commentsContainer">
                <p style="color: #a0a0a0; text-align: center;">Sin comentarios aún. ¡Sé el primero!</p>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p class="loading-text">Renderizando PDF...</p>
    </div>

    <!-- Error -->
    <div id="error" class="error-box" style="display: none;">
        <p class="error-text" id="errorText">Error</p>
        <button class="btn-back" onclick="goBack()">← Volver</button>
    </div>

    <script>
        let pageFlip = null;
        let db = null;
        let currentBook = null;
        let pageImages = [];
        let currentPageIndex = 0;

        const urlParams = new URLSearchParams(window.location.search);
        const bookId = parseInt(urlParams.get('id'));

        // Inicializar IndexedDB
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('EditorialFontana', 2);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('books')) {
                        database.createObjectStore('books', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('comments')) {
                        const commentsStore = database.createObjectStore('comments', { keyPath: 'id' });
                        commentsStore.createIndex('bookId', 'bookId', { unique: false });
                    }
                };
            });
        }

        // Obtener libro
        async function getBook(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['books'], 'readonly');
                const store = transaction.objectStore('books');
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Renderizar PDF
        async function renderPDF(pdfData) {
            try {
                document.getElementById('loading').style.display = 'flex';
                
                const binaryString = atob(pdfData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                const pdf = await pdfjsLib.getDocument(bytes.buffer).promise;
                pageImages = [];

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 2 });

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;

                    pageImages.push(canvas.toDataURL('image/jpeg', 0.95));
                }

                document.getElementById('loading').style.display = 'none';
                initPageFlip();

            } catch (error) {
                console.error('Error:', error);
                showError('Error al renderizar PDF: ' + error.message);
            }
        }

        // Inicializar PageFlip
        function initPageFlip() {
            const bookDiv = document.getElementById('book');
            bookDiv.innerHTML = '';

            // Crear elementos de página
            pageImages.forEach((imageUrl) => {
                const page = document.createElement('div');
                page.className = 'page';
                const img = document.createElement('img');
                img.src = imageUrl;
                page.appendChild(img);
                bookDiv.appendChild(page);
            });

            // Inicializar PageFlip cuando el DOM esté listo
            setTimeout(() => {
                try {
                    if (typeof PageFlip === 'undefined') {
                        showError('Error: StPageFlip no se cargó correctamente');
                        return;
                    }

                    pageFlip = new PageFlip(bookDiv, {
                        width: 600,
                        height: 700,
                        size: 'stretch',
                        minWidth: 300,
                        maxWidth: 1200,
                        minHeight: 400,
                        maxHeight: 1200,
                        maxShadowOpacity: 0.5,
                        showCover: true,
                        flareAngle: 60,
                        density: 0.6,
                        startPage: 1,
                        autoSize: true,
                        useMouseEvents: true,
                        swipeDistance: 50,
                        clickEventForward: true,
                        useSound: false,
                        hardCovers: true,
                        softPages: true,
                        realisticShadows: true
                    });

                    pageFlip.on('flip', (object) => {
                        currentPageIndex = object.data;
                        updatePageInfo();
                    });

                    pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                    updatePageInfo();

                } catch (error) {
                    console.error('Error inicializando PageFlip:', error);
                    showError('Error inicializando visualizador: ' + error.message);
                }
            }, 100);
        }

        // Mostrar info del autor
        function displayAuthorInfo() {
            if (currentBook) {
                if (currentBook.authorPhoto) {
                    const photoImg = document.getElementById('authorPhoto');
                    photoImg.src = currentBook.authorPhoto;
                    photoImg.style.display = 'block';
                    document.getElementById('authorPhotoPlaceholder').style.display = 'none';
                }

                const bio = `<strong>${currentBook.author}</strong> (${currentBook.year})<br><br>${currentBook.description || 'Autor destacado de Editorial Fontana'}`;
                document.getElementById('authorBio').innerHTML = bio;
            }
        }

        // Añadir comentario
        async function addComment() {
            const name = document.getElementById('commentName').value.trim();
            const rating = document.getElementById('commentRating').value;
            const text = document.getElementById('commentText').value.trim();

            if (!name || !text) {
                alert('Por favor completa todos los campos');
                return;
            }

            try {
                const comment = {
                    id: Date.now(),
                    bookId: bookId,
                    name: name,
                    rating: parseInt(rating),
                    text: text,
                    date: new Date().toLocaleDateString('es-CO')
                };

                const transaction = db.transaction(['comments'], 'readwrite');
                const store = transaction.objectStore('comments');
                store.add(comment);

                document.getElementById('commentName').value = '';
                document.getElementById('commentText').value = '';
                document.getElementById('commentRating').value = '5';

                alert('✅ Comentario publicado');
                await loadComments();
            } catch (error) {
                alert('Error al publicar');
            }
        }

        // Cargar comentarios
        async function loadComments() {
            return new Promise((resolve) => {
                try {
                    const transaction = db.transaction(['comments'], 'readonly');
                    const store = transaction.objectStore('comments');
                    const index = store.index('bookId');
                    const range = IDBKeyRange.only(bookId);
                    const request = index.getAll(range);

                    request.onsuccess = () => {
                        const comments = request.result || [];
                        displayComments(comments);
                        resolve();
                    };

                    request.onerror = () => {
                        document.getElementById('commentsContainer').innerHTML = 
                            '<p style="color: #a0a0a0; text-align: center;">Sin comentarios aún. ¡Sé el primero!</p>';
                        resolve();
                    };
                } catch (error) {
                    document.getElementById('commentsContainer').innerHTML = 
                        '<p style="color: #a0a0a0; text-align: center;">Sin comentarios aún. ¡Sé el primero!</p>';
                    resolve();
                }
            });
        }

        // Mostrar comentarios
        function displayComments(comments) {
            const container = document.getElementById('commentsContainer');

            if (comments.length === 0) {
                container.innerHTML = '<p style="color: #a0a0a0; text-align: center;">Sin comentarios aún. ¡Sé el primero!</p>';
                return;
            }

            container.innerHTML = comments.map(comment => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span class="comment-author">${comment.name}</span>
                        <span class="comment-date">${comment.date}</span>
                    </div>
                    <div class="comment-rating">${['⭐', '⭐⭐', '⭐⭐⭐', '⭐⭐⭐⭐', '⭐⭐⭐⭐⭐'][comment.rating - 1]}</div>
                    <div class="comment-text">${comment.text}</div>
                </div>
            `).join('');
        }

        // Navegación
        function nextPage() {
            if (pageFlip) pageFlip.turnToNextPage();
        }

        function prevPage() {
            if (pageFlip) pageFlip.turnToPrevPage();
        }

        function goToPageInput() {
            const pageNum = parseInt(document.getElementById('pageNum').value) - 1;
            if (pageFlip && pageNum >= 0 && pageNum < pageImages.length) {
                pageFlip.turnToPage(pageNum);
            }
        }

        function updatePageInfo() {
            const totalPages = pageImages.length;
            document.getElementById('pageNum').value = currentPageIndex + 1;
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('btnPrev').disabled = currentPageIndex <= 0;
            document.getElementById('btnNext').disabled = currentPageIndex >= totalPages - 1;
        }

        // UI
        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('error').style.display = 'flex';
            document.getElementById('loading').style.display = 'none';
        }

        function goBack() {
            history.back();
        }

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        // Inicializar
        async function init() {
            try {
                if (!bookId) {
                    showError('ID de libro no especificado');
                    return;
                }

                await initDB();
                const book = await getBook(bookId);

                if (!book) {
                    showError('Libro no encontrado');
                    return;
                }

                currentBook = book;
                document.getElementById('bookTitle').textContent = book.title;
                document.getElementById('bookAuthor').textContent = book.author;
                document.getElementById('bookYear').textContent = book.year;

                displayAuthorInfo();
                await renderPDF(book.pdf);
                await loadComments();

            } catch (error) {
                showError('Error: ' + error.message);
                console.error(error);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
