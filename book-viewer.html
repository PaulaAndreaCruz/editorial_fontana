<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Libro - Editorial Fontana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e27; color: #e0e0e0; font-family: Arial; }
        header { background: rgba(10, 14, 39, 0.9); border-bottom: 1px solid #00d4ff; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .header-wrapper { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #00ff88; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-back { background: #00d4ff; color: #0a0e27; border: none; padding: 0.8rem 1.5rem; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-back:hover { opacity: 0.8; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .error { background: rgba(255,107,107,0.2); color: #ff6b6b; padding: 2rem; border-radius: 8px; text-align: center; margin-top: 2rem; }
        .loading { text-align: center; padding: 3rem; color: #a0a0a0; }
        .book-info { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; margin-bottom: 3rem; background: rgba(30,41,82,0.6); padding: 2rem; border: 1px solid #00d4ff; border-radius: 8px; }
        .book-cover { text-align: center; }
        .book-cover img { max-width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,212,255,0.2); }
        .book-details h1 { color: #00ff88; margin-bottom: 1rem; }
        .book-details p { margin-bottom: 0.8rem; color: #a0a0a0; }
        .book-details .label { color: #00d4ff; font-weight: bold; }
        .author-section { margin-top: 2rem; }
        .author-section h3 { color: #00d4ff; margin-bottom: 1rem; }
        .author-photo { max-width: 200px; border-radius: 8px; }
        .pdf-viewer { background: rgba(30,41,82,0.6); padding: 2rem; border: 1px solid #00d4ff; border-radius: 8px; }
        .pdf-button { background: linear-gradient(135deg, #00d4ff, #00ff88); color: #0a0e27; border: none; padding: 1rem 2rem; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .pdf-button:hover { opacity: 0.9; }
        iframe { width: 100%; height: 800px; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div class="header-wrapper">
            <div class="logo" onclick="window.location.href='letras-y-versos.html'">EDITORIAL FONTANA</div>
            <button class="btn-back" onclick="window.history.back()">← Volver</button>
        </div>
    </header>

    <div class="container">
        <div id="loading" class="loading">Cargando libro...</div>
        <div id="content" style="display: none;">
            <div class="book-info">
                <div class="book-cover">
                    <img id="bookCover" src="" alt="Portada">
                </div>
                <div class="book-details">
                    <h1 id="bookTitle"></h1>
                    <p><span class="label">Autor:</span> <span id="bookAuthor"></span></p>
                    <p><span class="label">Año:</span> <span id="bookYear"></span></p>
                    <p><span class="label">Género:</span> <span id="bookGenre"></span></p>
                    <p><span class="label">Descripción:</span></p>
                    <p id="bookDesc"></p>
                    
                    <div class="author-section">
                        <h3>📸 Última Página (Autor)</h3>
                        <img id="authorPhoto" class="author-photo" src="" alt="Autor">
                    </div>
                </div>
            </div>

            <div class="pdf-viewer">
                <button class="pdf-button" onclick="abrirPDF()">📄 Ver PDF en Nueva Ventana</button>
                <p style="color: #a0a0a0; margin-top: 1rem; font-size: 0.9rem;">O visualiza el PDF aquí:</p>
                <iframe id="pdfViewer"></iframe>
            </div>
        </div>
        <div id="error" style="display: none;"></div>
    </div>

    <script>
        const supa = window.supabase.createClient(
            'https://dkvadgydaiaxvtzjblpd.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdmFkZ3lkYWlheHZ0empibHBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4ODI4NzEsImV4cCI6MjA5OTQ1ODg3MX0.AtzgtMrfeAgWiv5u-rCwtQOOHg-FgKxjlkVrejcWMuQ'
        );

        let currentBook = null;

        async function cargar() {
            try {
                // Obtener ID del URL o sessionStorage
                const params = new URLSearchParams(window.location.search);
                const bookId = params.get('id');

                if (!bookId && !sessionStorage.getItem('currentBook')) {
                    throw new Error('Libro no encontrado');
                }

                let libro;
                if (bookId) {
                    const { data } = await supa.from('libros').select('*').eq('id', bookId).single();
                    libro = data;
                } else {
                    libro = JSON.parse(sessionStorage.getItem('currentBook'));
                }

                if (!libro) {
                    throw new Error('No se pudo cargar el libro');
                }

                currentBook = libro;
                mostrar();
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `<div class="error"><h2>❌ Error</h2><p>${e.message}</p></div>`;
            }
        }

        function mostrar() {
            document.getElementById('bookTitle').textContent = currentBook.titulo;
            document.getElementById('bookAuthor').textContent = currentBook.autor;
            document.getElementById('bookYear').textContent = currentBook.año || 'N/A';
            document.getElementById('bookGenre').textContent = currentBook.genero || 'Digital';
            document.getElementById('bookDesc').textContent = currentBook.descripcion || 'Sin descripción';

            if (currentBook.portada_url) {
                document.getElementById('bookCover').src = currentBook.portada_url;
            }

            if (currentBook.autor_foto) {
                document.getElementById('authorPhoto').src = currentBook.autor_foto;
            } else {
                document.querySelector('.author-section').style.display = 'none';
            }

            if (currentBook.pdf_url) {
                document.getElementById('pdfViewer').src = `https://docs.google.com/gview?url=${encodeURIComponent(currentBook.pdf_url)}&embedded=true`;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function abrirPDF() {
            if (currentBook && currentBook.pdf_url) {
                window.open(currentBook.pdf_url, '_blank');
            }
        }

        window.addEventListener('load', cargar);
    </script>
</body>
</html>
