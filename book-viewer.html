<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visor Profesional de Libros - Editorial Fontana">
    <title>Libro | Editorial Fontana</title>
    
    <!-- PageFlip.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip@1.4.9/dist/page-flip.min.css">
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- PageFlip.js -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@1.4.9/dist/page-flip.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #1a1f3a;
            --accent: #00d4ff;
            --success: #00ff88;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
        }

        body {
            background: var(--primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--primary);
            padding: 1rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--secondary);
        }

        .header h1 {
            color: var(--accent);
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .header-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .btn-back {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-back:hover {
            background: #00b8d4;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .book-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1rem 0;
            perspective: 1200px;
        }

        #book {
            width: 100%;
            max-width: 90vw;
            height: auto;
            max-height: 85vh;
        }

        .book {
            width: 100%;
            height: 100%;
        }

        .page {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: white;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--secondary);
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .btn-control {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            min-height: 44px;
        }

        .btn-control:hover:not(:disabled) {
            background: #00b8d4;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-control:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
            min-width: 120px;
            justify-content: center;
        }

        .page-input {
            width: 50px;
            padding: 0.5rem;
            background: var(--primary);
            border: 2px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            text-align: center;
            font-weight: bold;
        }

        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            z-index: 1000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .error-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            z-index: 1000;
        }

        .error-message {
            color: #ff4444;
            font-size: 1.2rem;
            text-align: center;
            max-width: 500px;
        }

        .hints {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            border-top: 1px solid var(--secondary);
            padding-top: 1rem;
        }

        .hints p {
            margin: 0.5rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0.75rem;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
                width: 100%;
            }

            .btn-control {
                width: 100%;
            }

            .page-info {
                width: 100%;
            }

            #book {
                max-width: 100vw;
                max-height: 60vh;
            }

            .hints {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.2rem;
            }

            .btn-back {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            .controls {
                gap: 0.5rem;
            }

            .btn-control {
                padding: 0.6rem 1rem;
                font-size: 0.8rem;
            }
        }

        /* Animación de carga */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1419;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00b8d4;
        }

        /* PageFlip personalización */
        .page-flip-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div>
                    <h1 id="bookTitle">Cargando...</h1>
                    <div class="header-info">
                        <span id="bookAuthor"></span> • <span id="bookYear"></span>
                    </div>
                </div>
                <button class="btn-back" onclick="goBack()">← VOLVER</button>
            </div>

            <!-- Libro -->
            <div class="book-container">
                <div id="book" class="book"></div>
            </div>

            <!-- Controles -->
            <div class="controls">
                <button class="btn-control" id="btnPrev" onclick="prevPage()">← Anterior</button>
                
                <div class="page-info">
                    <span>Página:</span>
                    <input type="number" id="pageNum" class="page-input" min="1" onchange="goToPage()">
                    <span>/</span>
                    <span id="totalPages">0</span>
                </div>

                <button class="btn-control" id="btnNext" onclick="nextPage()">Siguiente →</button>
            </div>

            <!-- Hints -->
            <div class="hints">
                <p>💡 Usa flechas del teclado (← →) para navegar</p>
                <p>💡 Haz clic en las esquinas o arrastra para voltear la página</p>
                <p>💡 En móvil: desliza hacia los lados (swipe)</p>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading-spinner" style="display: none;">
            <div class="spinner"></div>
            <div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                </div>
                <p id="loadingText" style="margin-top: 1rem; color: var(--text-secondary);">Renderizando páginas...</p>
            </div>
        </div>

        <!-- Error -->
        <div id="error" class="error-container" style="display: none;">
            <p class="error-message" id="errorMessage">Error cargando el libro</p>
            <button class="btn-back" onclick="goBack()">← Volver</button>
        </div>
    </div>

    <script>
        // Esperar a que PageFlip esté disponible
        function waitForPageFlip() {
            return new Promise((resolve) => {
                if (typeof PageFlip !== 'undefined') {
                    resolve();
                } else {
                    const checkInterval = setInterval(() => {
                        if (typeof PageFlip !== 'undefined') {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);
                    // Timeout después de 5 segundos
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        resolve();
                    }, 5000);
                }
            });
        }

        // Configuración PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageFlip = null;
        let db = null;
        let currentBook = null;
        let currentPageNum = 1;

        // Obtener ID del libro de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = parseInt(urlParams.get('id'));

        // Inicializar IndexedDB
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('EditorialFontana', 1);
                request.onsuccess = () => { db = request.result; resolve(); };
                request.onerror = () => reject(request.error);
                request.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('books')) {
                        d.createObjectStore('books', { keyPath: 'id' });
                    }
                };
            });
        }

        // Obtener libro de IndexedDB
        async function getBook(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['books'], 'readonly');
                const store = transaction.objectStore('books');
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Cargar y renderizar PDF
        async function loadAndRenderPDF(pdfData) {
            try {
                showLoading(true);
                
                // Convertir base64 a ArrayBuffer
                const binaryString = atob(pdfData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Cargar PDF
                const pdf = await pdfjsLib.getDocument(bytes.buffer).promise;
                const pageImages = [];

                // Renderizar cada página
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 2 });

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;

                    const imageUrl = canvas.toDataURL('image/jpeg', 0.9);
                    pageImages.push(imageUrl);

                    // Actualizar progreso
                    const progress = (pageNum / pdf.numPages) * 100;
                    updateProgress(progress);
                }

                // Inicializar PageFlip
                initPageFlip(pageImages);
                showLoading(false);

            } catch (error) {
                showError('Error al renderizar el PDF: ' + error.message);
                console.error('Error:', error);
            }
        }

        // Inicializar PageFlip.js
        async function initPageFlip(imageUrls) {
            // Verificar que PageFlip está disponible
            if (typeof PageFlip === 'undefined') {
                showError('Error: PageFlip.js no se cargó correctamente. Recarga la página.');
                console.error('PageFlip is not defined');
                return;
            }

            const bookElement = document.getElementById('book');
            bookElement.innerHTML = '';

            // Crear elementos de página
            imageUrls.forEach(imageUrl => {
                const page = document.createElement('div');
                page.className = 'page';
                const img = document.createElement('img');
                img.src = imageUrl;
                page.appendChild(img);
                bookElement.appendChild(page);
            });

            // Configurar PageFlip
            pageFlip = new PageFlip(bookElement, {
                width: 600,
                height: 700,
                size: 'stretch',
                minWidth: 300,
                maxWidth: 1200,
                minHeight: 400,
                maxHeight: 1200,
                maxShadowOpacity: 0.5,
                showCover: true,
                flareAngle: 60,
                density: 0.6,
                startPage: 1,
                autoSize: true,
                useMouseEvents: true,
                swipeDistance: 50,
                clickEventForward: true,
                useSound: false,
            });

            // Eventos
            pageFlip.on('flip', (object) => {
                currentPageNum = object.data + 1;
                updatePageInfo();
            });

            // Inicializar
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            updatePageInfo();
        }

        // Actualizar información de página
        function updatePageInfo() {
            const totalPages = pageFlip ? pageFlip.getPageCount() : 0;
            document.getElementById('pageNum').value = currentPageNum;
            document.getElementById('totalPages').textContent = totalPages;
            
            // Actualizar botones
            document.getElementById('btnPrev').disabled = currentPageNum <= 1;
            document.getElementById('btnNext').disabled = currentPageNum >= totalPages;
        }

        // Navegación
        function nextPage() {
            if (pageFlip) pageFlip.turnToNextPage();
        }

        function prevPage() {
            if (pageFlip) pageFlip.turnToPrevPage();
        }

        function goToPage() {
            const pageNum = parseInt(document.getElementById('pageNum').value);
            if (pageFlip && pageNum >= 1 && pageNum <= pageFlip.getPageCount()) {
                pageFlip.turnToPage(pageNum - 1);
                currentPageNum = pageNum;
                updatePageInfo();
            }
        }

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        // UI
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('loadingText').textContent = `Renderizando páginas... ${Math.round(progress)}%`;
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('error').style.display = 'flex';
        }

        function goBack() {
            history.back();
        }

        // Cargar libro
        async function init() {
            try {
                // Esperar a que PageFlip cargue
                await waitForPageFlip();

                if (!bookId) {
                    showError('ID de libro no especificado');
                    return;
                }

                await initDB();
                const book = await getBook(bookId);

                if (!book) {
                    showError('Libro no encontrado');
                    return;
                }

                currentBook = book;
                document.getElementById('bookTitle').textContent = book.title;
                document.getElementById('bookAuthor').textContent = book.author;
                document.getElementById('bookYear').textContent = book.year;

                await loadAndRenderPDF(book.pdf);
            } catch (error) {
                showError('Error: ' + error.message);
                console.error('Error:', error);
            }
        }

        // Iniciar cuando la página cargue completamente
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
