<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Fontana - Lector Premium</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .control-bar {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            z-index: 1000;
        }

        .book-title {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(0, 212, 255, 0.4);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .reader-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.4) 100%);
            position: relative;
            overflow: hidden;
        }

        .book-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1000px;
            max-height: 700px;
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.6))
                    drop-shadow(0 0 40px rgba(0, 212, 255, 0.1));
            transition: all 0.3s ease;
        }

        .book-wrapper:hover {
            filter: drop-shadow(0 40px 80px rgba(0, 0, 0, 0.7))
                    drop-shadow(0 0 60px rgba(0, 212, 255, 0.15));
        }

        .book-wrapper::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, transparent 0%, rgba(0, 212, 255, 0.6) 50%, transparent 100%);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .book-content {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            gap: 0;
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.3);
        }

        .page-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: white;
        }

        .page-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-bar {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            height: 80px;
            z-index: 1000;
        }

        .nav-btn {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #0099ff, #00d4ff);
            color: #0a0e27;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 160px;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .nav-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-info {
            text-align: center;
            min-width: 280px;
        }

        .page-info .current {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-info .total {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 0.3rem;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            z-index: 2000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .control-bar {
                flex-wrap: wrap;
                gap: 1rem;
                height: auto;
                padding: 0.8rem 1rem;
            }

            .book-title {
                font-size: 1rem;
                width: 100%;
                order: -1;
            }

            .controls-group {
                justify-content: center;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .reader-wrapper {
                padding: 1rem;
            }

            .book-container {
                max-width: 90vw;
                max-height: 50vh;
            }

            .book-content {
                flex-direction: column;
            }

            .page-wrapper:last-child {
                display: none;
            }

            .nav-bar {
                flex-wrap: wrap;
                gap: 1rem;
                height: auto;
                padding: 1rem;
            }

            .nav-btn {
                padding: 0.6rem 1.2rem;
                min-width: 120px;
                font-size: 0.9rem;
            }

            .page-info {
                min-width: 100%;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div style="color: #00d4ff; font-weight: 700; font-size: 1.1rem;">Preparando libro...</div>
    </div>

    <div class="control-bar">
        <div class="book-title" id="bookTitle">Cargando...</div>
        <div class="controls-group">
            <button class="control-btn" onclick="zoomOut()" title="Alejar">🔍−</button>
            <span id="zoomLevel" style="color: #a0a0a0; font-weight: 700; min-width: 60px; text-align: center;">100%</span>
            <button class="control-btn" onclick="zoomReset()" title="Normal">↺</button>
            <button class="control-btn" onclick="zoomIn()" title="Acercar">🔍+</button>
            <button class="control-btn" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
            <button class="control-btn" onclick="toggleDarkMode()" title="Tema">🌙</button>
        </div>
    </div>

    <div class="reader-wrapper">
        <div class="book-container">
            <div class="book-wrapper">
                <div class="book-content">
                    <div class="page-wrapper" id="leftPage"></div>
                    <div class="page-wrapper" id="rightPage"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" id="prevBtn" onclick="previousPage()">← Anterior</button>
        <div class="page-info">
            <div class="current">Página <span id="pageNum">1</span> − <span id="pageTotal">0</span></div>
            <div class="total" id="pageRange">Página 1 - 2 de 20</div>
        </div>
        <button class="nav-btn" id="nextBtn" onclick="nextPage()">Siguiente →</button>
    </div>

    <script>
        let pdfDoc = null, db = null, currentBook = null, pageImages = [], currentPage = 0, currentZoom = 100;
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = parseInt(urlParams.get('id'));

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('EditorialFontana', 2);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('books')) database.createObjectStore('books', { keyPath: 'id' });
                    if (!database.objectStoreNames.contains('comments')) {
                        const commentsStore = database.createObjectStore('comments', { keyPath: 'id' });
                        commentsStore.createIndex('bookId', 'bookId', { unique: false });
                    }
                };
            });
        }

        async function getBook(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['books'], 'readonly');
                const request = transaction.objectStore('books').get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function renderPDF(pdfData) {
            try {
                const binaryString = atob(pdfData.split(',')[1] || pdfData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                pdfDoc = await pdfjsLib.getDocument(bytes.buffer).promise;
                pageImages = [];
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const page = await pdfDoc.getPage(i);
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 2 });
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    pageImages.push(canvas.toDataURL('image/jpeg', 0.95));
                }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('pageTotal').textContent = pageImages.length;
                updatePages();
            } catch (error) {
                document.getElementById('loading').innerHTML = '<div style="color: #ff6b6b; font-size: 1.5rem;">Error cargando PDF</div>';
            }
        }

        function updatePages() {
            const leftIdx = currentPage;
            const rightIdx = currentPage + 1;
            document.getElementById('leftPage').innerHTML = leftIdx < pageImages.length ? `<img src="${pageImages[leftIdx]}">` : '';
            document.getElementById('rightPage').innerHTML = rightIdx < pageImages.length ? `<img src="${pageImages[rightIdx]}">` : '';
            document.getElementById('pageNum').textContent = (leftIdx + 1);
            document.getElementById('pageRange').textContent = `Página ${leftIdx + 1}${rightIdx < pageImages.length ? ' - ' + (rightIdx + 1) : ''} de ${pageImages.length}`;
            document.getElementById('prevBtn').disabled = leftIdx === 0;
            document.getElementById('nextBtn').disabled = rightIdx >= pageImages.length;
        }

        function previousPage() { if (currentPage > 0) { currentPage -= 2; if (currentPage < 0) currentPage = 0; updatePages(); } }
        function nextPage() { if (currentPage + 2 < pageImages.length) { currentPage += 2; updatePages(); } }
        function zoomIn() { currentZoom = Math.min(currentZoom + 25, 300); applyZoom(); }
        function zoomOut() { currentZoom = Math.max(currentZoom - 25, 50); applyZoom(); }
        function zoomReset() { currentZoom = 100; applyZoom(); }
        function applyZoom() {
            const container = document.querySelector('.book-container');
            container.style.transform = `scale(${currentZoom / 100})`;
            document.getElementById('zoomLevel').textContent = currentZoom + '%';
        }
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.querySelector('.reader-wrapper').requestFullscreen().catch(err => {});
            } else {
                document.exitFullscreen();
            }
        }
        function toggleDarkMode() {
            document.body.style.background = document.body.style.background.includes('#f5f5f5')
                ? 'linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%)'
                : 'linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%)';
        }

        async function init() {
            try {
                await initDB();
                const book = await getBook(bookId);
                if (!book) throw new Error('Libro no encontrado');
                currentBook = book;
                document.getElementById('bookTitle').textContent = book.title;
                if (book.pdf) await renderPDF(book.pdf);
            } catch (error) {
                document.getElementById('loading').innerHTML = `<div style="color: #ff6b6b;">${error.message}</div>`;
            }
        }

        window.addEventListener('load', init);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') previousPage();
            if (e.key === 'ArrowRight') nextPage();
        });
    </script>
</body>
</html>
