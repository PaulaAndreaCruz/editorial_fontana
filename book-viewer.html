<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro | Editorial Fontana</title>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #1a1f3a;
        }

        .header h1 {
            color: #00d4ff;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .header-info {
            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .btn-back {
            background: #00d4ff;
            color: #0a0e27;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #00b8d4;
            transform: translateY(-2px);
        }

        .book-container {
            width: 100%;
            max-width: 1000px;
            height: 600px;
            margin: 1rem 0;
            background: #1a1f3a;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
        }

        #book {
            width: 100%;
            height: 100%;
            perspective: 1200px;
        }

        .book-page {
            width: 48%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            float: left;
            overflow: hidden;
            position: relative;
            box-shadow: inset -5px 0 15px rgba(0, 0, 0, 0.1);
        }

        .book-page:first-child {
            border-right: 3px solid #444;
        }

        .book-page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: white;
        }

        .controls {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background: #1a1f3a;
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .btn-control {
            background: #00d4ff;
            color: #0a0e27;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
        }

        .btn-control:hover:not(:disabled) {
            background: #00b8d4;
            transform: translateY(-2px);
        }

        .btn-control:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #a0a0a0;
            font-family: 'Courier New', monospace;
            flex: 1;
            justify-content: center;
        }

        .page-input {
            width: 50px;
            padding: 0.5rem;
            background: #0a0e27;
            border: 2px solid #00d4ff;
            border-radius: 6px;
            color: #00d4ff;
            text-align: center;
            font-weight: bold;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 2rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 2rem;
        }

        .error-text {
            color: #ff4444;
            font-size: 1.2rem;
            max-width: 500px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .book-container {
                height: 400px;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn-control {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 id="bookTitle">Cargando...</h1>
                <div class="header-info">
                    <span id="bookAuthor"></span> • <span id="bookYear"></span>
                </div>
            </div>
            <button class="btn-back" onclick="goBack()">← VOLVER</button>
        </div>

        <div class="book-container" id="bookContainer">
            <div id="book"></div>
        </div>

        <div class="controls">
            <button class="btn-control" id="btnPrev" onclick="prevPage()">← Anterior</button>
            
            <div class="page-info">
                <span>Página:</span>
                <input type="number" id="pageNum" class="page-input" min="1" onchange="goToPageInput()">
                <span>/</span>
                <span id="totalPages">0</span>
            </div>

            <button class="btn-control" id="btnNext" onclick="nextPage()">Siguiente →</button>
        </div>
    </div>

    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p id="loadingText" style="color: #a0a0a0;">Cargando y renderizando PDF...</p>
    </div>

    <div id="error" class="error" style="display: none;">
        <p class="error-text" id="errorText">Error</p>
        <button class="btn-back" onclick="goBack()">← Volver</button>
    </div>

    <script>
        let db = null;
        let currentBook = null;
        let allPages = [];
        let currentPageIndex = 0;

        // Obtener ID de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = parseInt(urlParams.get('id'));

        // Inicializar IndexedDB
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('EditorialFontana', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('books')) {
                        database.createObjectStore('books', { keyPath: 'id' });
                    }
                };
            });
        }

        // Obtener libro
        async function getBook(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['books'], 'readonly');
                const store = transaction.objectStore('books');
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Renderizar PDF
        async function renderPDF(pdfData) {
            try {
                document.getElementById('loading').style.display = 'flex';
                
                // Convertir base64 a ArrayBuffer
                const binaryString = atob(pdfData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Cargar PDF
                const pdf = await pdfjsLib.getDocument(bytes.buffer).promise;
                allPages = [];

                // Renderizar páginas
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 2 });

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;

                    allPages.push(canvas.toDataURL('image/jpeg', 0.95));
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('totalPages').textContent = allPages.length;
                currentPageIndex = 0;
                displayPages();

            } catch (error) {
                console.error('Error:', error);
                showError('Error al renderizar PDF: ' + error.message);
            }
        }

        // Mostrar páginas
        function displayPages() {
            const bookDiv = document.getElementById('book');
            bookDiv.innerHTML = '';

            // Mostrar 2 páginas: izquierda y derecha
            const leftPageNum = currentPageIndex;
            const rightPageNum = currentPageIndex + 1;

            // Página izquierda
            const leftDiv = document.createElement('div');
            leftDiv.className = 'book-page';
            if (leftPageNum < allPages.length) {
                const leftImg = document.createElement('img');
                leftImg.src = allPages[leftPageNum];
                leftDiv.appendChild(leftImg);
            }
            bookDiv.appendChild(leftDiv);

            // Página derecha
            const rightDiv = document.createElement('div');
            rightDiv.className = 'book-page';
            if (rightPageNum < allPages.length) {
                const rightImg = document.createElement('img');
                rightImg.src = allPages[rightPageNum];
                rightDiv.appendChild(rightImg);
            }
            bookDiv.appendChild(rightDiv);

            // Actualizar controles
            document.getElementById('pageNum').value = leftPageNum + 1;
            document.getElementById('btnPrev').disabled = leftPageNum <= 0;
            document.getElementById('btnNext').disabled = rightPageNum >= allPages.length;
        }

        // Navegación
        function nextPage() {
            if (currentPageIndex + 2 < allPages.length) {
                currentPageIndex += 2;
                displayPages();
            }
        }

        function prevPage() {
            if (currentPageIndex >= 2) {
                currentPageIndex -= 2;
                displayPages();
            }
        }

        function goToPageInput() {
            const pageNum = parseInt(document.getElementById('pageNum').value) - 1;
            if (pageNum >= 0 && pageNum < allPages.length) {
                currentPageIndex = pageNum % 2 === 0 ? pageNum : pageNum - 1;
                displayPages();
            }
        }

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        // UI
        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('error').style.display = 'flex';
            document.getElementById('loading').style.display = 'none';
        }

        function goBack() {
            history.back();
        }

        // Inicializar
        async function init() {
            try {
                if (!bookId) {
                    showError('ID de libro no especificado');
                    return;
                }

                await initDB();
                const book = await getBook(bookId);

                if (!book) {
                    showError('Libro no encontrado');
                    return;
                }

                currentBook = book;
                document.getElementById('bookTitle').textContent = book.title;
                document.getElementById('bookAuthor').textContent = book.author;
                document.getElementById('bookYear').textContent = book.year;

                await renderPDF(book.pdf);

            } catch (error) {
                showError('Error: ' + error.message);
                console.error(error);
            }
        }

        // Iniciar cuando DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
