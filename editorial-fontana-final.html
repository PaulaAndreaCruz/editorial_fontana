<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Fontana - Biblioteca Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(0, 255, 136, 0.2);
        }

        .header h1 {
            color: #00ff88;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .admin-link {
            margin-top: 2rem;
        }

        .admin-link a {
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0a0e27;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .admin-link a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filters input,
        .filters select {
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: inherit;
        }

        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .book-card {
            background: rgba(30, 41, 82, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .book-card:hover {
            transform: translateY(-10px);
            border-color: #00d4ff;
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        }

        .book-cover {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            overflow: hidden;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-info {
            padding: 1.5rem;
        }

        .book-title {
            color: #00ff88;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .book-author {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .book-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: #7a7a7a;
            margin-bottom: 1rem;
        }

        .book-description {
            color: #c0c0c0;
            font-size: 0.85rem;
            line-height: 1.4;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 1rem;
        }

        .book-btn {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0a0e27;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #a0a0a0;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #a0a0a0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1f3a;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            color: #00ff88;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 2rem;
            cursor: pointer;
            width: auto;
            padding: 0;
        }

        .modal-btn {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0a0e27;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .filters {
                flex-direction: column;
            }

            .filters input,
            .filters select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 EDITORIAL FONTANA</h1>
            <p>Biblioteca Digital</p>
            <div class="admin-link">
                <a href="admin-panel.html">🔐 Panel Admin</a>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="searchInput" placeholder="Buscar por título o autor..." style="flex: 1;">
            <select id="genreFilter">
                <option value="">Todos los géneros</option>
                <option value="Poesía">Poesía</option>
                <option value="Narrativa">Narrativa</option>
                <option value="Ensayo">Ensayo</option>
                <option value="Investigación">Investigación</option>
                <option value="Otro">Otro</option>
            </select>
        </div>

        <div class="books-grid" id="booksContainer">
            <div class="loading">Cargando libros desde Supabase</div>
        </div>
    </div>

    <div class="modal" id="bookModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-header" id="modalTitle"></div>
            <div id="modalBody"></div>
            <button class="modal-btn" id="readBtn" onclick="openBook()">📖 Leer Libro</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dkvadgydaiaxvtzjblpd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrdmFkZ3lkYWlheHZ0empibHBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4ODI4NzEsImV4cCI6MjA5OTQ1ODg3MX0.AtzgtMrfeAgWiv5u-rCwtQOOHg-FgKxjlkVrejcWMuQ';

        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let allBooks = [];
        let selectedBook = null;

        async function init() {
            await loadBooks();
            setupFilters();
        }

        async function loadBooks() {
            try {
                const { data: books, error } = await supabase
                    .from('libros')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allBooks = books || [];
                renderBooks(allBooks);
            } catch (error) {
                console.error('Error cargando libros:', error);
                document.getElementById('booksContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p>Error cargando libros de Supabase</p>
                    </div>
                `;
            }
        }

        function renderBooks(books) {
            const container = document.getElementById('booksContainer');

            if (books.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No hay libros disponibles</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = books.map(book => `
                <div class="book-card" onclick="showBookDetails('${book.id}')">
                    <div class="book-cover">
                        <img src="${book.portada_url}" alt="Portada" onerror="this.style.display='none'">
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.titulo}</div>
                        <div class="book-author">por ${book.autor}</div>
                        <div class="book-meta">
                            <span>📅 ${book.año || 'S/A'}</span>
                            <span>🏷️ ${book.genero || 'N/A'}</span>
                        </div>
                        <div class="book-description">${book.descripcion || ''}</div>
                        <button class="book-btn" onclick="event.stopPropagation(); openBook('${book.id}')">VER LIBRO</button>
                    </div>
                </div>
            `).join('');
        }

        function showBookDetails(bookId) {
            selectedBook = allBooks.find(b => b.id === bookId);
            if (!selectedBook) return;

            document.getElementById('modalTitle').textContent = selectedBook.titulo;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>Autor:</strong> ${selectedBook.autor}</p>
                <p><strong>Año:</strong> ${selectedBook.año || 'N/A'}</p>
                <p><strong>Género:</strong> ${selectedBook.genero || 'N/A'}</p>
                <p><strong>Descripción:</strong> ${selectedBook.descripcion || 'Sin descripción'}</p>
            `;
            document.getElementById('bookModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('bookModal').classList.remove('active');
        }

        function openBook(bookId = null) {
            const book = selectedBook || allBooks.find(b => b.id === bookId);
            if (!book || !book.pdf_url) {
                alert('No hay URL de PDF disponible');
                return;
            }

            sessionStorage.setItem('currentBook', JSON.stringify(book));
            window.location.href = `book-viewer.html?id=${book.id}`;
        }

        function setupFilters() {
            document.getElementById('searchInput').addEventListener('input', filterBooks);
            document.getElementById('genreFilter').addEventListener('change', filterBooks);
        }

        function filterBooks() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;

            const filtered = allBooks.filter(book => {
                const matchSearch = book.titulo.toLowerCase().includes(search) || 
                                  book.autor.toLowerCase().includes(search);
                const matchGenre = !genre || book.genero === genre;
                return matchSearch && matchGenre;
            });

            renderBooks(filtered);
        }

        window.addEventListener('load', init);

        document.getElementById('bookModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('bookModal')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
