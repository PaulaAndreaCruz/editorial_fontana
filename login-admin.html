<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel Administrativo - Editorial Fontana">
    <title>Login | Panel Administrativo - Editorial Fontana</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #0f1535;
            --tertiary: #1a1f3a;
            --accent-cyan: #00d4ff;
            --accent-blue: #0099ff;
            --accent-green: #00ff88;
            --text-light: #ffffff;
            --text-main: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-light: rgba(255, 255, 255, 0.08);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: rgba(15, 21, 53, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            height: 100px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo img {
            height: 100%;
            width: auto;
            max-width: 320px;
            object-fit: contain;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .form-error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .form-error.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: var(--primary);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .btn-login:hover {
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-back {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            color: var(--accent-cyan);
            border: 2px solid var(--accent-cyan);
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .btn-back:hover {
            background: var(--accent-cyan);
            color: var(--primary);
        }

        .login-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .login-info strong {
            color: var(--accent-cyan);
        }

        .info-title {
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--text-main);
        }

        .info-item {
            margin-bottom: 0.5rem;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem;
            }

            .login-logo {
                height: 60px;
            }

            .login-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <img src="assets/logo_1.png" alt="Editorial Fontana">
            </div>
            <h1 class="login-title">Panel Administrativo</h1>
            <p class="login-subtitle">Acceso restringido</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <input 
                    type="text" 
                    id="username" 
                    class="form-input" 
                    placeholder="Ingresa tu usuario"
                    required
                >
                <div class="form-error" id="usernameError">Usuario incorrecto</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="Ingresa tu contraseña"
                    required
                >
                <div class="form-error" id="passwordError">Contraseña incorrecta</div>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <button class="btn-back" onclick="goBack()">← Volver</button>

        <div class="login-info">
            <div class="info-title">📋 Credenciales de Prueba</div>
            <div class="info-item">
                <strong>Usuario:</strong> lector
            </div>
            <div class="info-item">
                <strong>Contraseña:</strong> lector123
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const usernameError = document.getElementById('usernameError');
            const passwordError = document.getElementById('passwordError');

            // Limpiar errores
            usernameError.classList.remove('show');
            passwordError.classList.remove('show');

            // Validar credenciales
            const validUsername = 'lector';
            const validPassword = 'lector123';

            let hasError = false;

            if (username !== validUsername) {
                usernameError.classList.add('show');
                hasError = true;
            }

            if (password !== validPassword) {
                passwordError.classList.add('show');
                hasError = true;
            }

            if (!hasError) {
                // Login exitoso
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminLoginTime', new Date().getTime());
                window.location.href = 'admin-panel.html';
            }
        }

        function goBack() {
            window.location.href = 'https://paulaandreacruz.github.io/editorial_fontana/';
        }

        // Limpiar errores cuando el usuario empieza a escribir
        document.getElementById('username').addEventListener('input', function() {
            document.getElementById('usernameError').classList.remove('show');
        });

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('passwordError').classList.remove('show');
        });

        // Permitir Enter para submitir el formulario
        document.getElementById('loginForm').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                handleLogin(event);
            }
        });
    </script>

</body>
</html>
